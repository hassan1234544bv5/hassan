<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علي وسجاد رزاق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #8a2be2;
            --deep-gold: #b8860b;
            --maroon: #800000;
            --light-purple: #e6d6f5;
            --gold-glow: #ffd700;
            --shadow-3d: 0 25px 50px rgba(0,0,0,0.3);
            --heart-shape: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5  Asc 3 5.92 10.5 3 14.5 3s7.92 2.42 10.5 5.92C21.58 5.42 24 7.92 24 11s-2.42 5.92-5.92 7.53L12 21.35z';
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--light-purple), #f8f4ff, #e8d5f5);
            font-family: 'Amiri', 'Cairo', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* Floating Hearts Background */
        .floating-heart {
            position: absolute;
            color: var(--purple);
            font-size: 20px;
            animation: float-hearts 6s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes float-hearts {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Main Poster Card - 3D Tilt */
        .poster-card {
            width: clamp(350px, 90vw, 420px);
            height: clamp(500px, 85vh, 600px);
            background: linear-gradient(145deg, #fffdf9, #f9f7ff);
            border: 18px double var(--deep-gold);
            box-shadow: var(--shadow-3d), 0 0 60px rgba(138,43,226,0.3);
            position: relative;
            text-align: center;
            padding: 40px 30px;
            border-radius: 30px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            backdrop-filter: blur(15px);
            will-change: transform;
        }

        .poster-card:hover {
            transform: translateY(-15px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 0 35px 70px rgba(0,0,0,0.4), 0 0 80px rgba(138,43,226,0.5);
        }

        /* Hero Typography - Cascade Animation */
        .hero-title {
            background: linear-gradient(45deg, var(--maroon), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Cairo', sans-serif;
            font-size: clamp(28px, 6vw, 38px);
            font-weight: 900;
            margin: 0 0 25px;
            text-shadow: 0 0 30px rgba(138,43,226,0.6);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 20px rgba(138,43,226,0.5), 0 0 40px rgba(184,134,11,0.3); }
            100% { text-shadow: 0 0 30px rgba(138,43,226,0.8), 0 0 60px rgba(184,134,11,0.5); }
        }

        /* DOUBLE PHOTO FRAME */
        .double-image-container {
            position: relative;
            margin: 30px auto;
            width: 240px;
            height: 240px;
        }

        /* Outer Gold Frame */
        .outer-frame {
            width: 100%;
            height: 100%;
            border: 12px double var(--deep-gold);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 40px rgba(184,134,11,0.6);
            animation: outerPulse 3s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes outerPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(184,134,11,0.6); transform: scale(1); }
            50% { box-shadow: 0 0 60px rgba(184,134,11,0.9); transform: scale(1.03); }
        }

        /* Inner Purple Glowing Frame */
        .inner-frame {
            width: 88%;
            height: 88%;
            border: 6px solid var(--purple);
            border-radius: 48%;
            position: absolute;
            top: 6%;
            left: 6%;
            box-shadow: 
                inset 0 0 30px rgba(138,43,226,0.4),
                0 0 50px rgba(138,43,226,0.7);
            animation: innerGlow 2.5s ease-in-out infinite alternate;
            z-index: 3;
            background: radial-gradient(circle, rgba(138,43,226,0.1) 0%, transparent 70%);
        }

        @keyframes innerGlow {
            0% { box-shadow: inset 0 0 30px rgba(138,43,226,0.4), 0 0 50px rgba(138,43,226,0.7); }
            100% { box-shadow: inset 0 0 40px rgba(138,43,226,0.6), 0 0 70px rgba(138,43,226,1); }
        }

        /* Photo Image */
        .photo-image {
            width: 82%;
            height: 82%;
            border-radius: 45%;
            position: absolute;
            top: 9%;
            left: 9%;
            object-fit: cover;
            z-index: 4;
            transition: transform 0.3s ease;
        }

        .double-image-container:hover .photo-image {
            transform: scale(1.05);
        }

        /* Message & Names */
        .wedding-message {
            color: #333;
            line-height: 1.9;
            font-size: clamp(16px, 4vw, 22px);
            margin: 30px 0;
            font-family: 'Amiri', serif;
            opacity: 0;
            animation: fadeInContent 1.5s ease forwards 0.5s;
        }

        .names-ribbon {
            background: linear-gradient(90deg, var(--maroon), var(--deep-gold));
            color: white;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: clamp(22px, 5vw, 28px);
            padding: 20px 30px;
            margin: 25px 0;
            border-radius: 50px;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: ribbonSlide 1.8s ease forwards 1s;
            box-shadow: 0 10px 30px rgba(128,0,0,0.4);
        }

        .names-ribbon::before,
        .names-ribbon::after {
            content: '🎀';
            position: absolute;
            top: -10px;
            font-size: 24px;
            animation: bowWiggle 2s ease-in-out infinite;
        }

        .names-ribbon::before { left: 15px; }
        .names-ribbon::after { right: 15px; }

        @keyframes fadeInContent { to { opacity: 1; } }
        @keyframes ribbonSlide {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes bowWiggle { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

        /* DECORATIVE SHAPES - NICE SVGs */
        .decor-left {
            position: absolute;
            top: 20px;
            left: -40px;
            width: 80px;
            opacity: 0.8;
            animation: decorFloat 4s ease-in-out infinite;
        }

        .decor-right {
            position: absolute;
            top: 20px;
            right: -40px;
            width: 80px;
            opacity: 0.8;
            animation: decorFloat 4s ease-in-out infinite reverse;
        }

        @keyframes decorFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(10deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .poster-card { padding: 25px 20px; border-width: 12px; }
            .decor-left, .decor-right { width: 60px; top: 10px; }
        }

        @media (max-aspect-ratio: 1/1) {
            body { align-items: flex-start; padding-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="poster-card">
        <!-- Decorative Shapes Left/Right -->
        <svg class="decor-left" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <!-- Golden Heart -->
            <path d="M50 15 C45 10 35 10 30 20 C25 30 25 45 35 55 C40 60 48 70 50 75 C52 70 60 60 65 55 C75 45 75 30 70 20 C65 10 55 10 50 15 Z" fill="var(--deep-gold)" opacity="0.9"/>
            <!-- Floral Swirl -->
            <path d="M10 80 Q30 60 50 80 Q70 60 90 80 Q70 100 50 80 Q30 100 10 80" stroke="var(--purple)" stroke-width="4" fill="none" stroke-linecap="round"/>
        </svg>
        
        <svg class="decor-right" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <!-- Golden Heart -->
            <path d="M50 15 C45 10 35 10 30 20 C25 30 25 45 35 55 C40 60 48 70 50 75 C52 70 60 60 65 55 C75 45 75 30 70 20 C65 10 55 10 50 15 Z" fill="var(--deep-gold)" opacity="0.9"/>
            <!-- Floral Swirl -->
            <path d="M10 80 Q30 60 50 80 Q70 60 90 80 Q70 100 50 80 Q30 100 10 80" stroke="var(--purple)" stroke-width="4" fill="none" stroke-linecap="round"/>
        </svg>

        <h1 class="hero-title">بارك الله لكما</h1>
        
        <!-- DOUBLE FRAME PHOTO -->
        <div class="double-image-container">
            <div class="outer-frame"></div>
            <div class="inner-frame"></div>
            <img class="photo-image" src="https://via.placeholder.com/200x200/ffb6c1/fff?text=👰🤵💕" alt="صورة العرسان">
        </div>
        
        <div class="wedding-message">
            بكل الحب والوفاء، نبارك لكما هذا الرباط المقدس الذي يجمع بين قلبين في
        </div>
        
        <div class="names-ribbon">
            زواج مبارك وسعيد إن شاء الله
        </div>
        
        <div class="wedding-message" style="animation-delay: 1.2s;">
            جعله الله بداية لحياة مليئة بالسعادة والمودة والرحمة، وبارك عليكما وبارك وأنشر حُبَّكما.
        </div>
    </div>

    <script>
        // Enhanced Heart Particles + Confetti + Tilt
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '💜';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const conf = document.createElement('div');
                    conf.innerHTML = ['💎','✨','🌟','💍'][Math.floor(Math.random()*4)];
                    conf.style.position = 'fixed';
                    conf.style.left = Math.random() * 100 + 'vw';
                    conf.style.top = '-10px';
                    conf.style.pointerEvents = 'none';
                    conf.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    conf.style.animation = 'fall linear 3s forwards';
                    conf.style.zIndex = '1000';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 3000);
                }, i * 50);
            }
        }

        // 3D Tilt Effect
        const card = document.querySelector('.poster-card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const rotateX = y / rect.height * 10;
            const rotateY = -x / rect.width * 10;
            card.style.transform = `translateY(-15px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'translateY(-15px)';
        });

        // Init
        createConfetti();
        setInterval(createFloatingHeart, 400);

        // Pause on hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(window.heartInterval);
            else window.heartInterval = setInterval(createFloatingHeart, 400);
        });
    </script>
</body>
</html>
